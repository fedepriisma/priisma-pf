name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:
  schedule:
    # 09:00 UTC = 5am Miami (EDT): rebuild daily so the Showbliz
    # "on stage tonight" ticker refetches feed/today.xml.
    # NOTE: GitHub disables scheduled workflows after ~60 days of repo
    # inactivity — if the ticker goes stale, re-enable in the Actions tab.
    - cron: "0 9 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; a stale scheduled run must never overwrite a newer push deploy
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository using git
        uses: actions/checkout@v5

      - name: Install, build, and upload your site output
        uses: withastro/action@v5
        # with:
        #   path: . # root of your Astro project (optional)
        #   node-version: 24 # optional; defaults are handled by the action
        #   package-manager: pnpm@latest # optional; auto-detected from lockfile

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
